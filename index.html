<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-white min-h-screen">

<div id="toast" class="fixed top-4 right-4 space-y-2 z-50"></div>

<div class="p-4 border-b border-gray-800">
  <div class="flex gap-2 flex-col sm:flex-row">
    <input id="url" class="flex-1 p-3 bg-gray-900 border rounded"
      placeholder="https://example.com">
    <button id="run" class="bg-blue-600 px-5 py-3 rounded">Run</button>
  </div>
  <div class="flex justify-between text-sm mt-2 text-gray-400">
    <span id="status">Idle</span>
    <span id="mode">direct</span>
  </div>
</div>

<div class="p-4 grid gap-4 md:grid-cols-[260px_1fr]">

  <div id="summary" class="bg-gray-900 p-3 rounded"></div>

  <div>
    <div class="flex gap-2 mb-3 overflow-auto">
      <button class="tab border px-3 py-2 rounded" data-tab="overview">Overview</button>
      <button class="tab border px-3 py-2 rounded" data-tab="sitemap">Sitemap</button>
      <button class="tab border px-3 py-2 rounded" data-tab="robots">Robots</button>
    </div>
    <div id="content"></div>
  </div>

</div>

<script>

// ===== STATE =====
const state = {
  url:"",
  tab:"overview",
  page:null,
  robots:"",
  sitemap:[],
};

// ===== UTILS =====
const $ = id => document.getElementById(id);

function toast(msg){
  const el=document.createElement("div");
  el.className="bg-blue-600 px-3 py-2 rounded text-sm";
  el.innerText=msg;
  $("toast").appendChild(el);
  setTimeout(()=>el.remove(),3000);
}

function normalize(u){
  return u.startsWith("http")?u:"https://"+u;
}

// ===== 🔥 SINGLE FETCH PIPELINE =====
async function fetchProxy(url){
  const proxy = "https://api.allorigins.win/raw?url=" + encodeURIComponent(url);
  const res = await fetch(proxy);
  if(!res.ok) throw new Error("Fetch failed");
  $("mode").innerText = "proxy";
  return await res.text();
}

// ===== PARSE =====
function parseHTML(html){
  const d=new DOMParser().parseFromString(html,"text/html");
  return {
    title:d.title,
    desc:d.querySelector("meta[name=description]")?.content || ""
  };
}

function parseXML(xml){
  const doc = new DOMParser().parseFromString(xml,"text/xml");

  if(doc.querySelector("parsererror")){
    throw new Error("Invalid XML");
  }

  return [...doc.getElementsByTagName("loc")].map(n=>n.textContent);
}

// ===== 🔥 ROBUST SITEMAP FLOW =====
async function getSitemap(base){

  let robotsText="";
  let sitemapLinks=[];

  try{
    robotsText = await fetchProxy(base+"/robots.txt");
    state.robots = robotsText;

    sitemapLinks = [...robotsText.matchAll(/Sitemap:\s*(.+)/gi)]
      .map(m=>m[1].trim());

  }catch{
    toast("robots fetch failed");
  }

  // 🔥 If robots has sitemap → use it
  for(const sm of sitemapLinks){
    try{
      const xml = await fetchProxy(sm);

      // DEBUG
      if(!xml.includes("<urlset") && !xml.includes("<sitemapindex")){
        console.warn("Not valid sitemap XML:", xml.slice(0,200));
      }

      const urls = parseXML(xml);

      if(urls.length){
        toast("Sitemap loaded");
        return urls;
      }

    }catch(e){
      console.warn("Sitemap parse fail:", e.message);
    }
  }

  // 🔥 Fallback paths
  const fallback = [
    "/sitemap.xml",
    "/sitemap_index.xml"
  ];

  for(const p of fallback){
    try{
      const xml = await fetchProxy(base+p);
      const urls = parseXML(xml);

      if(urls.length){
        toast("Fallback sitemap loaded");
        return urls;
      }

    }catch{}
  }

  return [];
}

// ===== RUN =====
$("run").onclick = async ()=>{
  try{
    const input = $("url").value.trim();
    if(!input) return toast("Enter URL");

    const url = normalize(input);
    state.url = url;

    $("status").innerText="Loading...";
    $("content").innerHTML="Loading...";

    // PAGE
    const html = await fetchProxy(url);
    state.page = parseHTML(html);

    // SITEMAP
    state.sitemap = await getSitemap(url);

    if(!state.sitemap.length){
      toast("Sitemap blocked or dynamic");
    }

    render();
    $("status").innerText="Done";

  }catch(e){
    $("status").innerText="Error";
    toast(e.message);
  }
};

// ===== UI =====
function render(){

  $("summary").innerHTML=`
    <div>Title: ${state.page?.title}</div>
    <div>Sitemap URLs: ${state.sitemap.length}</div>
  `;

  if(state.tab==="overview"){
    $("content").innerHTML=`
      <div>${state.page?.title}</div>
      <div>${state.page?.desc}</div>
    `;
  }

  if(state.tab==="sitemap"){
    $("content").innerHTML =
      state.sitemap.length
        ? state.sitemap.slice(0,50).join("<br>")
        : "No sitemap detected";
  }

  if(state.tab==="robots"){
    $("content").innerText = state.robots;
  }
}

// ===== TABS =====
document.querySelectorAll(".tab").forEach(btn=>{
  btn.onclick = ()=>{
    state.tab = btn.dataset.tab;
    render();
  };
});

</script>

</body>
</html>
