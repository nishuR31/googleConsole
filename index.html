<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEO Inspector Pro</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-[#05080f] text-white min-h-screen">

<div id="toast" class="fixed top-4 right-4 z-50 space-y-2"></div>

<div class="p-4 border-b border-slate-800 sticky top-0 bg-[#05080f]">
  <div class="flex flex-col md:flex-row gap-2">
    <input id="url" class="flex-1 p-3 bg-[#0c1220] border border-slate-700 rounded"
      placeholder="https://example.com">
    <button id="run" class="bg-blue-600 px-4 py-3 rounded">Run</button>
  </div>
  <div class="flex justify-between text-xs mt-2 text-slate-400">
    <span id="status">Idle</span>
    <span id="mode">direct</span>
  </div>
</div>

<div class="p-4 grid gap-4 md:grid-cols-[250px_1fr]">
  <div class="space-y-4">
    <div id="summary" class="bg-[#0c1220] p-3 rounded"></div>
  </div>

  <div>
    <div class="flex gap-2 overflow-auto mb-3 text-sm">
      <button class="tab border px-3 py-2 rounded" data-tab="overview">Overview</button>
      <button class="tab border px-3 py-2 rounded" data-tab="sitemap">Sitemap</button>
      <button class="tab border px-3 py-2 rounded" data-tab="robots">Robots</button>
    </div>
    <div id="content"></div>
  </div>
</div>

<script>

// ===== STATE =====
const state = {
  tab:"overview",
  url:"",
  page:null,
  sitemap:[],
  robots:""
};

const $=id=>document.getElementById(id);

// ===== TOAST =====
function toast(msg){
  const el=document.createElement("div");
  el.className="bg-blue-600 px-3 py-2 rounded text-sm";
  el.innerText=msg;
  $("toast").appendChild(el);
  setTimeout(()=>el.remove(),3000);
}

// ===== FETCH =====
async function fetchSafe(url){
  try{
    const r=await fetch(url);
    if(!r.ok) throw "";
    $("mode").innerText="direct";
    return await r.text();
  }catch{
    const proxy="https://api.allorigins.win/raw?url="+encodeURIComponent(url);
    const r=await fetch(proxy);
    $("mode").innerText="proxy";
    return await r.text();
  }
}

// ===== PARSE =====
function parseHTML(html){
  const d=new DOMParser().parseFromString(html,"text/html");
  return {
    title:d.title,
    desc:d.querySelector("meta[name=description]")?.content || ""
  };
}

function parseSitemap(xml){
  const d=new DOMParser().parseFromString(xml,"text/xml");
  return [...d.getElementsByTagName("loc")].map(n=>n.textContent);
}

// ===== 🔥 FIXED ROBOTS PARSER =====
function extractSitemaps(robots){
  const lines = robots.split("\n");
  const sitemaps = [];

  for(const line of lines){
    const match = line.match(/^\s*Sitemap:\s*(.+)$/i);
    if(match){
      sitemaps.push(match[1].trim());
    }
  }

  return sitemaps;
}

// ===== 🔥 FIXED SITEMAP FLOW =====
async function getSitemap(base){

  let sitemapUrls = [];

  try{
    const robots = await fetchSafe(base+"/robots.txt");
    state.robots = robots;

    const sitemapLinks = extractSitemaps(robots);

    if(sitemapLinks.length){
      toast("Sitemap found in robots");

      for(const link of sitemapLinks){
        try{
          const xml = await fetchSafe(link);
          const urls = parseSitemap(xml);
          sitemapUrls.push(...urls);
        }catch{}
      }

      return [...new Set(sitemapUrls)];
    }

  }catch{
    toast("robots fetch failed");
  }

  // fallback
  const fallback = ["/sitemap.xml","/sitemap_index.xml"];

  for(const p of fallback){
    try{
      const xml = await fetchSafe(base+p);
      const urls = parseSitemap(xml);
      if(urls.length) return urls;
    }catch{}
  }

  return [];
}

// ===== RUN =====
$("run").onclick = async ()=>{
  const input=$("url").value.trim();
  if(!input) return toast("Enter URL");

  const url = input.startsWith("http")?input:"https://"+input;
  state.url = url;

  $("status").innerText="Loading...";

  try{
    const html = await fetchSafe(url);
    state.page = parseHTML(html);

    state.sitemap = await getSitemap(url);

    if(state.sitemap.length){
      toast("Sitemap loaded: "+state.sitemap.length);
    }else{
      toast("Sitemap not accessible (CORS or dynamic)");
    }

    render();
    $("status").innerText="Done";

  }catch(e){
    $("status").innerText="Error";
    toast(e.message);
  }
};

// ===== UI =====
function render(){

  $("summary").innerHTML=`
    <div>Title: ${state.page?.title||""}</div>
    <div>Sitemap URLs: ${state.sitemap.length}</div>
  `;

  if(state.tab==="overview"){
    $("content").innerHTML=`
      <div class="text-sm space-y-2">
        <div>${state.page?.title}</div>
        <div>${state.page?.desc}</div>
      </div>
    `;
  }

  if(state.tab==="sitemap"){
    $("content").innerHTML = state.sitemap.length
      ? state.sitemap.slice(0,30).join("<br>")
      : "No sitemap";
  }

  if(state.tab==="robots"){
    $("content").innerText = state.robots;
  }
}

// ===== TABS =====
document.querySelectorAll(".tab").forEach(b=>{
  b.onclick=()=>{
    state.tab=b.dataset.tab;
    render();
  };
});

</script>

</body>
</html>
