<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SEO Inspector Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      color-scheme: dark;
    }
    html.light {
      color-scheme: light;
    }
    html.light body {
      background: #f8fafc;
      color: #0f172a;
    }
    html.light .panel {
      background: #ffffff;
      border-color: #e2e8f0;
    }
    html.light .muted {
      color: #475569;
    }
    html.light .subtle {
      color: #64748b;
    }
    html.light .soft {
      background: #f8fafc;
      border-color: #e2e8f0;
    }
    .scrollbar::-webkit-scrollbar { height: 10px; width: 10px; }
    .scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 999px; }
    .scrollbar::-webkit-scrollbar-track { background: transparent; }
    .tab-active {
      border-color: #3b82f6 !important;
      background: rgba(59,130,246,.12);
      color: #fff;
    }
    html.light .tab-active {
      color: #0f172a;
      background: rgba(59,130,246,.08);
    }
    .ring-gauge {
      background: conic-gradient(var(--gauge-color) var(--gauge-deg), #1f2937 0deg);
    }
    html.light .ring-gauge {
      background: conic-gradient(var(--gauge-color) var(--gauge-deg), #e2e8f0 0deg);
    }
    .line-clamp-2 {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .skeleton {
      position: relative;
      overflow: hidden;
      background: #111827;
    }
    html.light .skeleton { background: #e2e8f0; }
    .skeleton::after {
      content: "";
      position: absolute;
      inset: 0;
      transform: translateX(-100%);
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.08), transparent);
      animation: shimmer 1.2s infinite;
    }
    @keyframes shimmer {
      100% { transform: translateX(100%); }
    }
  </style>
</head>

<body class="min-h-screen bg-[#070b12] text-slate-100">
  <div class="sticky top-0 z-30 border-b border-slate-800/80 bg-[#070b12]/95 backdrop-blur">
    <div class="mx-auto max-w-7xl px-3 py-3 md:px-4">
      <div class="flex flex-col gap-3">
        <div class="flex items-center justify-between gap-2">
          <div>
            <h1 class="text-lg font-semibold tracking-tight md:text-2xl">SEO Inspector Pro</h1>
            <p class="text-xs text-slate-400 md:text-sm">crawl, preview, diagnose, and score a site in one panel</p>
          </div>
          <button id="openSettingsBtn" class="rounded-xl border border-slate-700 px-3 py-2 text-xs font-medium text-slate-200 hover:bg-slate-800 md:text-sm">
            Settings
          </button>
        </div>

        <div class="flex flex-col gap-2 md:flex-row">
          <input id="urlInput" type="url" placeholder="https://example.com"
            class="w-full flex-1 rounded-xl border border-slate-700 bg-slate-950 px-4 py-3 text-sm outline-none ring-0 placeholder:text-slate-500 focus:border-blue-500 md:text-base" />
          <button id="runBtn"
            class="rounded-xl bg-blue-600 px-5 py-3 text-sm font-semibold text-white hover:bg-blue-500 active:bg-blue-700 md:w-36 md:text-base">
            Run
          </button>
        </div>

        <div class="flex items-center justify-between gap-3">
          <div id="status" class="text-xs text-slate-400 md:text-sm">Idle</div>
          <div id="fetchModeBadge" class="rounded-full border border-slate-700 px-3 py-1 text-[11px] text-slate-400">
            direct
          </div>
        </div>

        <div class="scrollbar -mx-1 overflow-x-auto pb-1">
          <div class="flex min-w-max gap-2 px-1">
            <button data-tab="overview" class="tabBtn tab-active rounded-xl border border-slate-700 px-4 py-2 text-sm">Overview</button>
            <button data-tab="robots" class="tabBtn rounded-xl border border-slate-700 px-4 py-2 text-sm">Robots</button>
            <button data-tab="sitemap" class="tabBtn rounded-xl border border-slate-700 px-4 py-2 text-sm">Sitemap</button>
            <button data-tab="page" class="tabBtn rounded-xl border border-slate-700 px-4 py-2 text-sm">Page</button>
            <button data-tab="meta" class="tabBtn rounded-xl border border-slate-700 px-4 py-2 text-sm">Meta</button>
            <button data-tab="social" class="tabBtn rounded-xl border border-slate-700 px-4 py-2 text-sm">Social</button>
            <button data-tab="accessibility" class="tabBtn rounded-xl border border-slate-700 px-4 py-2 text-sm">Accessibility</button>
            <button data-tab="schema" class="tabBtn rounded-xl border border-slate-700 px-4 py-2 text-sm">Schema</button>
            <button data-tab="performance" class="tabBtn rounded-xl border border-slate-700 px-4 py-2 text-sm">Performance</button>
            <button data-tab="settings" class="tabBtn rounded-xl border border-slate-700 px-4 py-2 text-sm">Settings</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <main class="mx-auto max-w-7xl px-3 py-4 md:px-4 md:py-6">
    <div id="root" class="grid gap-4 md:grid-cols-[340px_minmax(0,1fr)]">
      <aside class="space-y-4">
        <section id="summaryPanel" class="panel rounded-2xl border border-slate-800 bg-[#0b1220] p-4 shadow-xl shadow-black/10"></section>
        <section id="issuePanel" class="panel rounded-2xl border border-slate-800 bg-[#0b1220] p-4 shadow-xl shadow-black/10"></section>
        <section id="quickPanel" class="panel rounded-2xl border border-slate-800 bg-[#0b1220] p-4 shadow-xl shadow-black/10"></section>
      </aside>

      <section class="min-w-0 space-y-4">
        <div id="content" class="panel rounded-2xl border border-slate-800 bg-[#0b1220] p-4 shadow-xl shadow-black/10 md:p-5"></div>
      </section>
    </div>
  </main>

  <div id="settingsDrawer" class="fixed inset-0 z-40 hidden">
    <div id="settingsOverlay" class="absolute inset-0 bg-black/70"></div>
    <div class="absolute right-0 top-0 h-full w-full max-w-lg overflow-y-auto border-l border-slate-800 bg-[#08101c] p-4 shadow-2xl shadow-black/50">
      <div class="flex items-center justify-between gap-2 border-b border-slate-800 pb-3">
        <h2 class="text-lg font-semibold">Settings</h2>
        <button id="closeSettingsBtn" class="rounded-lg border border-slate-700 px-3 py-2 text-sm hover:bg-slate-800">Close</button>
      </div>

      <div class="mt-4 space-y-4">
        <label class="block">
          <span class="mb-2 block text-sm text-slate-300">Theme</span>
          <select id="themeSelect" class="w-full rounded-xl border border-slate-700 bg-slate-950 px-3 py-3 text-sm outline-none">
            <option value="dark">Dark</option>
            <option value="light">Light</option>
          </select>
        </label>

        <label class="block">
          <span class="mb-2 block text-sm text-slate-300">Density</span>
          <select id="densitySelect" class="w-full rounded-xl border border-slate-700 bg-slate-950 px-3 py-3 text-sm outline-none">
            <option value="comfortable">Comfortable</option>
            <option value="compact">Compact</option>
          </select>
        </label>

        <label class="flex items-center justify-between gap-3 rounded-xl border border-slate-800 p-3">
          <div>
            <div class="text-sm font-medium">Use proxy for cross-origin fetch</div>
            <div class="text-xs text-slate-400">Needed for real page data when CORS blocks direct access.</div>
          </div>
          <input id="useProxyToggle" type="checkbox" class="h-5 w-5 accent-blue-500">
        </label>

        <label class="block">
          <span class="mb-2 block text-sm text-slate-300">Proxy endpoint template</span>
          <input id="proxyUrlInput" class="w-full rounded-xl border border-slate-700 bg-slate-950 px-3 py-3 text-sm outline-none"
            placeholder="https://your-domain.com/api/fetch?url={{url}}">
          <div class="mt-2 text-xs text-slate-500">
            Use <code>{{url}}</code> as the placeholder. The endpoint must return raw text for the requested URL.
          </div>
        </label>

        <label class="block">
          <span class="mb-2 block text-sm text-slate-300">PageSpeed API key (optional)</span>
          <input id="pagespeedKeyInput" class="w-full rounded-xl border border-slate-700 bg-slate-950 px-3 py-3 text-sm outline-none"
            placeholder="AIza...">
          <div class="mt-2 text-xs text-slate-500">
            Used only for real PSI scoring. Without a key, heuristic performance scoring is shown.
          </div>
        </label>

        <label class="flex items-center justify-between gap-3 rounded-xl border border-slate-800 p-3">
          <div>
            <div class="text-sm font-medium">Auto analyze on Run</div>
            <div class="text-xs text-slate-400">Refreshes summary and page module automatically.</div>
          </div>
          <input id="autoAnalyzeToggle" type="checkbox" class="h-5 w-5 accent-blue-500">
        </label>

        <button id="saveSettingsBtn" class="w-full rounded-xl bg-blue-600 px-4 py-3 text-sm font-semibold text-white hover:bg-blue-500">
          Save settings
        </button>

        <div class="rounded-2xl border border-slate-800 bg-slate-950 p-4 text-sm text-slate-300">
          <div class="font-medium text-slate-100">Reality check</div>
          <p class="mt-2 text-slate-400">
            Full cross-origin inspection is blocked by browsers unless you use a proxy. This UI handles that cleanly instead of lying with fake zeroes.
          </p>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ===== SAFE WRAPPER =====
function safe(fn){
  return async (...args)=>{
    try{
      return await fn(...args);
    }catch(e){
      console.error(e);
      setStatus("Error: "+(e.message||"Unknown"));
    }
  }
}

// ===== STATUS =====
function setStatus(msg){
  els.status.innerText = msg;
}

// ===== FETCH BADGE =====
function updateFetchBadge(){
  els.fetchModeBadge.innerText = state.fetchMode;
}

// ===== RUN =====
els.runBtn.onclick = safe(async ()=>{

  const url = normalizeUrl(els.urlInput.value);
  if(!url){
    setStatus("Enter URL");
    return;
  }

  state.baseUrl = url;
  state.currentPageUrl = url;

  setStatus("Loading...");
  renderSkeleton();

  // RESET
  state.pageHtml="";
  state.pageInfo=null;
  state.sitemapUrls=[];
  state.robotsText="";

  // PAGE
  try{
    const res = await fetchText(url);
    state.fetchMode = res.mode;
    updateFetchBadge();

    state.pageHtml = res.text;
    state.pageInfo = parseHtml(res.text,url);

  }catch{
    state.pageError="fail";
  }

  // ROBOTS
  try{
    const r = await fetchText(url+"/robots.txt");
    state.robotsText = r.text;
  }catch{
    state.robotsText="";
  }

  // SITEMAP
  try{
    const sm = await collectSitemapUrls(url,state.robotsText);
    state.sitemapUrls = sm.urls;
    state.sitemapSources = sm.childSitemaps;
  }catch{}

  // SCORE
  if(state.pageInfo){
    const scores = computeScores(
      state.pageInfo,
      state.sitemapUrls.length,
      state.robotsText
    );

    state.score = {
      overall: scores.overall,
      technical: scores.technicalScore,
      content: scores.contentScore,
      accessibility: scores.accessibilityScore,
      social: scores.socialScore,
      crawlability: scores.crawlScore,
      performance: scores.performanceScore
    };

    state.issues = getIssues(
      state.pageInfo,
      state.sitemapUrls.length,
      state.robotsText,
      scores
    );
  }

  renderAll();
  setStatus("Done");
});


// ===== CENTRAL RENDER =====
function renderAll(){
  tabsMarkup(state.activeTab);
  renderSummary();
  renderIssues();
  renderQuick();

  switch(state.activeTab){
    case "overview": renderOverview(); break;
    case "robots": renderRobotsTab(); break;
    case "sitemap": renderSitemapTab(); break;
    case "page": renderPageTab(); break;
    case "meta": renderMetaTab(); break;
    case "social": renderSocialTab(); break;
    case "accessibility": renderAccessibilityTab(); break;
    case "schema": renderSchemaTab(); break;
    case "performance": renderPerformanceTab(); break;
    case "settings": openSettings(); break;
  }
}


// ===== TAB BIND =====
document.querySelectorAll(".tabBtn").forEach(btn=>{
  btn.onclick = ()=>{
    state.activeTab = btn.dataset.tab;
    renderAll();
  };
});


// ===== SETTINGS =====
function openSettings(){
  els.settingsDrawer.classList.remove("hidden");
}
function closeSettings(){
  els.settingsDrawer.classList.add("hidden");
}

els.openSettingsBtn.onclick = openSettings;
els.closeSettingsBtn.onclick = closeSettings;
els.settingsOverlay.onclick = closeSettings;

els.saveSettingsBtn.onclick = ()=>{
  state.theme = els.themeSelect.value;
  state.density = els.densitySelect.value;
  state.useProxy = els.useProxyToggle.checked;
  state.proxyUrl = els.proxyUrlInput.value;
  state.pagespeedKey = els.pagespeedKeyInput.value;
  state.autoAnalyze = els.autoAnalyzeToggle.checked;

  localStorage.setItem("seoSettings", JSON.stringify(state));

  closeSettings();
};


// ===== LOAD SETTINGS =====
(function(){
  try{
    const s = JSON.parse(localStorage.getItem("seoSettings")||"{}");

    Object.assign(state,s);

    els.themeSelect.value = state.theme || "dark";
    els.densitySelect.value = state.density || "comfortable";
    els.useProxyToggle.checked = state.useProxy || false;
    els.proxyUrlInput.value = state.proxyUrl || "";
    els.pagespeedKeyInput.value = state.pagespeedKey || "";
    els.autoAnalyzeToggle.checked = state.autoAnalyze ?? true;

  }catch{}
})();


// ===== ANALYZE PAGE BUTTON =====
function bindAnalyzeButtons(){
  document.querySelectorAll(".analyzePageBtn").forEach(btn=>{
    btn.onclick = safe(async ()=>{
      const url = btn.dataset.pageUrl;
      state.currentPageUrl = url;

      setStatus("Loading page...");
      renderSkeleton();

      const res = await fetchText(url);
      state.pageHtml = res.text;
      state.pageInfo = parseHtml(res.text,url);

      renderAll();
      setStatus("Page loaded");
    });
  });
}


// ===== PERFORMANCE TAB FIX (YOUR BROKEN PART) =====
function renderPerformanceTab(){
  const p = state.pageInfo;
  if(!p){
    els.content.innerHTML = `<div>No page loaded</div>`;
    return;
  }

  const heuristic = heuristicPerformance(p);

  els.content.innerHTML = `
    <div class="space-y-4">

      ${statCard("Heuristic Score", heuristic)}

      <button id="runPsiBtn"
        class="rounded-xl bg-blue-600 px-4 py-3 text-white">
        Run PageSpeed
      </button>

      <div id="psiResult" class="text-sm text-slate-400">
        ${state.psiScore ? "Score: "+state.psiScore : "Not run"}
      </div>

    </div>
  `;

  const btn = document.getElementById("runPsiBtn");

  if(btn){
    btn.onclick = safe(async ()=>{

      if(!state.pagespeedKey){
        setStatus("Add API key in settings");
        return;
      }

      setStatus("Running PSI...");

      const api = `https://www.googleapis.com/pagespeedonline/v5/runPagespeed?url=${encodeURIComponent(state.currentPageUrl)}&key=${state.pagespeedKey}`;

      const res = await fetch(api);
      const data = await res.json();

      const score = Math.round(
        (data.lighthouseResult.categories.performance.score || 0)*100
      );

      state.psiScore = score;

      renderPerformanceTab();
      setStatus("PSI Done");
    });
  }
}
  </script>
</body>
</html>
